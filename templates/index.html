<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>C.H.A.R.L.E.S - IA</title>
<style>
body {font-family: Arial; background:#0f172a; color:white; display:flex; flex-direction:column; align-items:center; margin:0; padding:20px;}
h2 {color:#38bdf8;}
#chat {width:400px; height:500px; overflow-y:auto; background:#1e293b; padding:10px; border-radius:10px; display:flex; flex-direction:column;}
.msg {margin:5px 0; padding:10px; border-radius:8px; max-width:80%; word-wrap:break-word;}
.user {background:#2563eb; align-self:flex-end; text-align:right;}
.bot {background:#334155; align-self:flex-start;}
#container {margin-top:15px; display:flex; width:400px; justify-content:space-between;}
input {flex:1; padding:10px; border-radius:8px; border:none;}
button {padding:10px; margin-left:5px; border-radius:8px; background:#3b82f6; border:none; cursor:pointer; color:white; font-weight:bold;}
button:hover {background:#1d4ed8;}
</style>
</head>
<body>
<h2>🤖 C.H.A.R.L.E.S</h2>
<div id="chat"></div>
<div id="container">
<input id="msg" type="text" placeholder="Digite sua mensagem...">
<button onclick="enviar()">Enviar</button>
</div>

<script>
async function enviar(){
    let input=document.getElementById("msg");
    let texto=input.value.trim();
    if(!texto) return;
    adicionarMensagem(texto,"user");
    
    let res=await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({mensagem:texto})
    });
    let data=await res.json();
    adicionarMensagem(data.resposta,"bot");
    
    // Perguntar se usuário quer ensinar
    if(!data.resposta.includes("Não entendi muito bem") && !data.resposta.includes("Ainda estou aprendendo")){
        input.value="";
        return;
    }
    
    let ensinar=confirm("Quer me ensinar a responder isso?");
    if(ensinar){
        let resposta_nova=prompt("Digite a resposta correta:");
        if(resposta_nova){
            await fetch("/ensinar",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({mensagem:texto,resposta:resposta_nova})
            });
            adicionarMensagem("Agora aprendi! 🤖","bot");
        }
    }
    input.value="";
}

function adicionarMensagem(texto,tipo){
    let chat=document.getElementById("chat");
    let div=document.createElement("div");
    div.className="msg "+tipo;
    div.innerText=texto;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

document.getElementById("msg").addEventListener("keypress",function(e){
    if(e.key==="Enter") enviar();
});
</script>
</body>
</html>
