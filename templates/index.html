<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CHARLES - IA</title>
    

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .chat-container {
            width: 900px;
            height: 700px;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            background: #2a2a2a;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .mensagem {
            margin-bottom: 10px;
            display: flex;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 10px;
            border-radius: 10px;
        }

        .user .bubble {
            background: #4caf50;
        }

        .bot .bubble {
            background: #333;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            background: #222;
            color: white;
        }

        button {
            padding: 12px 20px;
            border: none;
            background: #4caf50;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #45a049;
        }

        .loading::after {
    content: "...";
    animation: dots 1s infinite;
}

@keyframes dots {
    0% { content: "."; }
    33% { content: ".."; }
    66% { content: "..."; }
}
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">C.H.A.R.L.E.S - IA</div>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input id="msg" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">Enviar</button>
    </div>
</div>

<script>
    
    async function enviar() {
        let input = document.getElementById("msg");
        let mensagem = input.value;

        if (!mensagem) return;

        adicionarMensagem(mensagem, "user");
        input.value = "";

        let loadingId = adicionarLoading();

        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({mensagem})
        });

        let data = await res.json();

        
        removerLoading(loadingId);

        adicionarMensagem(data.resposta, "bot");
    }

    function adicionarMensagem(texto, tipo) {
        let chat = document.getElementById("chat");

        let msgDiv = document.createElement("div");
        msgDiv.classList.add("mensagem", tipo);

        let bubble = document.createElement("div");
        bubble.classList.add("bubble");
        bubble.innerText = texto;

        msgDiv.appendChild(bubble);
        chat.appendChild(msgDiv);

        chat.scrollTop = chat.scrollHeight;
    }

    
    function adicionarLoading() {
        let chat = document.getElementById("chat");

        let msgDiv = document.createElement("div");
        msgDiv.classList.add("mensagem", "bot");

        let bubble = document.createElement("div");
        bubble.classList.add("bubble");
        bubble.innerHTML = "<span class='loading'></span>";

        msgDiv.appendChild(bubble);

        let id = "loading-" + Date.now();
        msgDiv.id = id;

        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;

        return id;
    }

    function removerLoading(id) {
        let el = document.getElementById(id);
        if (el) el.remove();
    }
</script>

</body>
</html>
